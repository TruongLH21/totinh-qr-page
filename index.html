<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            height: 100vh;
            position: relative;
            color: white;
            cursor: pointer;
        }

        /* TIM RƠI */
        .heart {
            position: absolute;
            top: -10px;
            color: white;
            animation: fall linear forwards;
            opacity: 0.8;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        /* KHUNG CHÍNH */
        .main {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 700px;
            text-align: center;
            z-index: 10;
        }

        .main h1 {
            font-size: 40px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .main p {
            font-size: 18px;
            margin-bottom: 25px;
        }

        /* ẢNH */
        .gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 25px;
            border: 4px solid white;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        /* VIDEO */
        video {
            width: 100%;
            border-radius: 20px;
            margin-top: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* CÂU HỎI */
        #questionText {
            margin-top: 30px;
            font-size: 28px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* NÚT */
        .button-box {
            margin-top: 35px;
            position: relative;
            height: 140px;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.25s;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        #yesBtn { background: white; color: #ff4f81; }
        #noBtn { background: #222; color: white; }

        /* TIMER */
        #loveTimer {
            margin-top: 30px;
            font-size: 22px;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        /* CHỮ BAY */
        .message {
            position: absolute;
            white-space: nowrap;
            font-size: 20px;
            animation: floatMessage linear forwards;
            opacity: 0.9;
            pointer-events: none;
        }

        @keyframes floatMessage {
            from { transform: translateY(100vh); }
            to { transform: translateY(-120vh); }
        }
    </style>
</head>
<body>

<!-- NHẠC (ẨN THANH ĐIỀU KHIỂN) -->
<audio id="bgMusic" loop>
    <source src="mot-doi.mp3.mp3" type="audio/mpeg">
</audio>

<div class="main">
    <h1>❤️ Gửi Đến Cậu ❤️</h1>
    <p>Chào mừng đến ngôi nhà trái tim của tuii 😳</p>

    <div class="gallery">
        <img src="your-image.jpg" alt="Kỷ niệm">
    </div>

    <video id="loveVideo" controls>
        <source src="your-video.mp4" type="video/mp4">
    </video>

    <h2 id="questionText">Cậu thấy web này cute chứ? 😳</h2>

    <div class="button-box">
        <button id="yesBtn">Có 💖</button>
        <button id="noBtn">Không 💔</button>
    </div>

    <div id="loveTimer"></div>
</div>

<script>
    const bgMusic = document.getElementById("bgMusic");
    const loveVideo = document.getElementById("loveVideo");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const questionText = document.getElementById("questionText");
    const loveTimer = document.getElementById("loveTimer");

    // 1. PHÁT NHẠC KHI NGƯỜI DÙNG CLICK VÀO WEB (VƯỢT RÀO CẢN TRÌNH DUYỆT)
    document.body.addEventListener('click', () => {
        if (bgMusic.paused && loveVideo.paused) {
            bgMusic.play().catch(e => console.log("Audio play blocked"));
        }
    }, { once: true });

    // 2. TẮT NHẠC KHI BẬT VIDEO, BẬT LẠI KHI VIDEO DỪNG
    loveVideo.addEventListener("play", () => { bgMusic.pause(); });
    loveVideo.addEventListener("pause", () => { bgMusic.play(); });
    loveVideo.addEventListener("ended", () => { bgMusic.play(); });

    // 3. HIỆU ỨNG TIM RƠI
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 15 + "px";
        heart.style.animationDuration = Math.random() * 3 + 3 + "s";
        document.body.appendChild(heart);
        setTimeout(() => { heart.remove(); }, 6000);
    }
    setInterval(createHeart, 300);

    // 4. CHỮ BAY
    const messages = ["Tớ thích cậu ❤️", "Cậu đáng yêu lắm 🌸", "Có cậu là tuyệt nhất 💖", "Mãi bên nhau nhé ✨", "Trường yêu Títtt ❤️"];
    function createMessage() {
        const msg = document.createElement("div");
        msg.classList.add("message");
        msg.innerHTML = messages[Math.floor(Math.random() * messages.length)];
        msg.style.left = Math.random() * 80 + "vw";
        msg.style.animationDuration = Math.random() * 5 + 5 + "s";
        document.body.appendChild(msg);
        setTimeout(() => { msg.remove(); }, 10000);
    }
    setInterval(createMessage, 1500);

    // 5. LOGIC CÂU HỎI & NÚT BẤM
    const questions = [
        "Cậu thấy web này cute chứ? 😳",
        "Làm như này cậu thấy vui không? 🌸",
        "Cậu có bất ngờ không? 💖",
        "Cậu đồng ý làm người yêu tớ nhớ 😭❤️"
    ];
    let currentQuestion = 0;

    function moveNoButton() {
        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 100);
        noBtn.style.position = "fixed";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    yesBtn.onclick = function() {
        if (currentQuestion < 3) {
            currentQuestion++;
            questionText.innerHTML = questions[currentQuestion];
            if (currentQuestion === 3) {
                yesBtn.innerHTML = "Đồng ý ❤️";
                noBtn.innerHTML = "Không đồng ý 💔";
                noBtn.onmouseover = moveNoButton;
            }
        } else {
            // Hiệu ứng pháo hoa tim khi đồng ý
            for(let i=0; i<150; i++){
                const h = document.createElement("div");
                h.innerHTML = "❤️";
                h.style.position = "fixed";
                h.style.left = "50%"; h.style.top = "50%";
                h.style.transition = "all 2s ease-out";
                h.style.fontSize = "20px";
                document.body.appendChild(h);
                const rx = (Math.random()-0.5)*1500;
                const ry = (Math.random()-0.5)*1500;
                setTimeout(() => {
                    h.style.transform = `translate(${rx}px, ${ry}px)`;
                    h.style.opacity = "0";
                }, 10);
                setTimeout(() => h.remove(), 2000);
            }
            alert("Yêu nhau rồi nha ❤️");
            startLoveTimer();
        }
    };

    noBtn.onclick = function() {
        if (currentQuestion < 3) {
            currentQuestion++;
            questionText.innerHTML = questions[currentQuestion];
        }
    };

    // 6. TIMER KỶ NIỆM
    let loveStart = localStorage.getItem("loveStart");

    function startLoveTimer() {
        if (!loveStart) {
            loveStart = new Date().getTime();
            localStorage.setItem("loveStart", loveStart);
        }
        loveTimer.style.display = "block";
        questionText.innerHTML = "💖 Chúng mình đang yêu nhau đó 💖";
        yesBtn.style.display = "none";
        noBtn.style.display = "none";
        setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        const now = new Date().getTime();
        const diff = now - Number(loveStart);
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((diff % (1000 * 60)) / 1000);
        
        const d = new Date(Number(loveStart));
        loveTimer.innerHTML = `💖 Yêu từ: ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} 💖<br><br>` +
                              `💞 Đã bên nhau: ${days} ngày ${hours} giờ ${mins} phút ${secs} giây 💞`;
    }

    if (loveStart) startLoveTimer();
</script>

</body>
</html>
