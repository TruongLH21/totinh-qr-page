<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    overflow:hidden;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    height:100vh;
    position:relative;
    color:white;
}

/* TIM RƠI */

.heart{
    position:absolute;
    top:-10px;
    color:white;
    animation:fall linear forwards;
    opacity:0.8;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}

/* KHUNG CHÍNH */

.main{

    position:absolute;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    width:90%;

    max-width:700px;

    text-align:center;

    z-index:10;
}

.main h1{

    font-size:50px;

    margin-bottom:20px;

    text-shadow:0 0 20px rgba(255,255,255,0.8);
}

.main p{

    font-size:22px;

    margin-bottom:25px;
}

/* ẢNH */

.gallery img{

    width:240px;

    height:240px;

    object-fit:cover;

    border-radius:25px;

    border:4px solid white;

    box-shadow:0 0 25px rgba(255,255,255,0.5);

    margin-bottom:20px;
}

/* VIDEO */

video{

    width:100%;

    border-radius:20px;

    margin-top:15px;

    pointer-events:none;

    box-shadow:0 0 20px rgba(255,255,255,0.4);
}

/* CÂU HỎI */

#questionText{

    margin-top:30px;

    font-size:34px;

    text-shadow:0 0 15px rgba(255,255,255,0.8);
}

/* NÚT */

.button-box{

    margin-top:35px;

    position:relative;

    height:160px;
}

button{

    padding:16px 35px;

    margin:10px;

    border:none;

    border-radius:50px;

    font-size:24px;

    cursor:pointer;

    font-weight:bold;

    transition:0.25s;

    box-shadow:0 0 20px rgba(255,255,255,0.5);
}

button:hover{
    transform:scale(1.08);
}

#yesBtn{

    background:white;

    color:#ff4f81;

#noBtn{

    background:#222;

    color:white;
}

#resetBtn{

    background:#ffffff33;

    color:white;

    margin-top:20px;

    font-size:18px;
}

/* TIMER */

#loveTimer{

    margin-top:30px;

    font-size:28px;

<body>

<!-- NHẠC -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="main">

    <h1>❤️ Gửi Đến Cậu ❤️</h1>

    <p>
        Chào mừng đến ngôi nhà trái tim của tuii 😳
    </p>

    <!-- ẢNH -->
    <div class="gallery">

        <img src="your-image.jpg">

    </div>

    <!-- VIDEO -->
    <video autoplay muted loop>
        <source src="your-video.mp4" type="video/mp4">
    </video>

    <!-- CÂU HỎI -->
    <h2 id="questionText">

        Cậu thấy web này cute chứ? 😳

    </h2>

    <!-- NÚT -->
    <div class="button-box">

        <button id="yesBtn">
            Có 💖
        </button>

        <button id="noBtn">
            Không 💔
        </button>

    </div>

    <!-- TIMER -->
    <div id="loveTimer"></div>

    <!-- RESET -->
    <button id="resetBtn" onclick="resetLove()">
        Reset thời gian 💔
    </button>

</div>

<script>

/* TIM RƠI */

function createHeart(){

    const heart =
        document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random()*100 + "vw";

    heart.style.fontSize =
        Math.random()*20 + 15 + "px";

    heart.style.animationDuration =
        Math.random()*3 + 3 + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

setInterval(createHeart,200);


/* CHỮ BAY */

const messages = [

    "Tớ thích cậu ❤️",

    "Cậu đáng yêu lắm 🌸",

    "Có cậu là tuyệt nhất 💖",

    "Mong cậu luôn vui,hạnh phúc ✨",

    "Trường yêu Títtt ❤️"
];

function createMessage(){

    const msg =
        document.createElement("div");

    msg.classList.add("message");

    msg.innerHTML =
        messages[
            Math.floor(
                Math.random()*messages.length
            )
        ];

    msg.style.left =
        Math.random()*90 + "vw";

    msg.style.animationDuration =
        Math.random()*6 + 5 + "s";

    document.body.appendChild(msg);

    setTimeout(()=>{
        msg.remove();
    },12000);
}

setInterval(createMessage,1200);


/* CÂU HỎI */

const questions = [

    "Cậu thấy web này cute chứ? 😳",

    "Làm như này cậu thấy vui không? 🌸",

    "Cậu có bất ngờ không? 💖",

    "Cậu đồng ý làm người yêu tớ nhớ 😭❤️"
];

let currentQuestion = 0;

const questionText =
    document.getElementById("questionText");

const yesBtn =
    document.getElementById("yesBtn");

const noBtn =
    document.getElementById("noBtn");

const loveTimer =
    document.getElementById("loveTimer");

/* LƯU THỜI GIAN */

let loveStart =
    localStorage.getItem("loveStart");


/* NẾU ĐÃ YÊU */

if(loveStart){

    loveTimer.style.display = "block";

    questionText.innerHTML =
        "💖 Chúng mình đang yêu nhau đó 💖";

    yesBtn.style.display = "none";

    noBtn.style.display = "none";

    setInterval(updateLoveTimer,1000);
}


/* NÚT CÓ */

yesBtn.onclick = function(){

    /* CÂU CUỐI */

    if(currentQuestion === 3){

        /* PHÁO HOA TIM */

        for(let i=0; i<220; i++){

            const heart =
                document.createElement("div");

            heart.innerHTML = "❤️";

            heart.style.position = "fixed";

            heart.style.left = "50%";

            heart.style.top = "50%";

            heart.style.fontSize =
                Math.random()*35 + 20 + "px";

            heart.style.pointerEvents = "none";

            heart.style.zIndex = "9999";

            const x =
                (Math.random()-0.5)*1800;

            const y =
                (Math.random()-0.5)*1800;

            heart.style.transition =
                "transform 2s ease-out, opacity 2s";

            document.body.appendChild(heart);

            setTimeout(()=>{

                heart.style.transform =
                    `translate(${x}px, ${y}px)`;

                heart.style.opacity = "0";

            },10);

            setTimeout(()=>{
                heart.remove();
            },2000);
        }

        alert("Yêu nhau rồi nha ❤️");

        /* LƯU THỜI GIAN */

        if(!loveStart){

            loveStart = new Date().getTime();

            localStorage.setItem(
                "loveStart",
                loveStart
            );
        }

        loveTimer.style.display =
            "block";

        yesBtn.style.display =
            "none";

        noBtn.style.display =
            "none";

        questionText.innerHTML =
            "💖 Chúng mình đang yêu nhau đó 💖";

        setInterval(updateLoveTimer,1000);

        return;
    }

    /* CHUYỂN CÂU */

    currentQuestion++;

    questionText.innerHTML =
        questions[currentQuestion];

    /* CÂU CUỐI */

    if(currentQuestion === 3){

        yesBtn.innerHTML =
            "Đồng ý ❤️";

        noBtn.innerHTML =
            "Không đồng ý 💔";

        noBtn.onmouseover =
            moveNoButton;
    }
};


/* NÚT KHÔNG */

noBtn.onclick = function(){

    if(currentQuestion === 3){
        return;
    }

    currentQuestion++;

    questionText.innerHTML =
        questions[currentQuestion];

    if(currentQuestion === 3){

        yesBtn.innerHTML =
            "Đồng ý ❤️";

        noBtn.innerHTML =
            "Không đồng ý 💔";

        noBtn.onmouseover =
            moveNoButton;
    }
};


/* NÚT KHÔNG CHẠY */

function moveNoButton(){

    const x =
        Math.random()*
        (window.innerWidth-200);

    const y =
        Math.random()*
        (window.innerHeight-100);

    noBtn.style.position = "fixed";

    noBtn.style.left = x + "px";

    noBtn.style.top = y + "px";
}


/* TIMER */

function updateLoveTimer(){

    const now = new Date();

    const diff =
        now.getTime() - Number(loveStart);

    const days = Math.floor(
        diff / (1000*60*60*24)
    );

    const hours = Math.floor(
        (diff % (1000*60*60*24))
        / (1000*60*60)
    );

    const minutes = Math.floor(
        (diff % (1000*60*60))
        / (1000*60)
    );

    const seconds = Math.floor(
        (diff % (1000*60))
        / 1000
    );

    const startDate =
        new Date(Number(loveStart));

    const day =
        startDate.getDate();

    const month =
        startDate.getMonth()+1;

    const year =
        startDate.getFullYear();

    loveTimer.innerHTML =

        `💖 Yêu nhau từ:
        ${day}/${month}/${year} 💖

        <br><br>

        💞 Đã tin tưởng nhau được:
        ${days} ngày
        ${hours} giờ
        ${minutes} phút
        ${seconds} giây 💞`;
}


/* RESET */

function resetLove(){

    localStorage.removeItem("loveStart");

    location.reload();
}

</script>

</body>
</html>
